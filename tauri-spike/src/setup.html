<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<style>
  :root{
    --bg:#0d0d10; --bg2:#15151a;
    --panel:#1a1a20; --border:#2a2a32; --border-h:#3c3c46;
    --text:#e9e9ee; --muted:#7b7b87; --muted2:#54545e;
    --gold:#d4a54a; --gold-h:#e3b75f; --gold-d:#b88a39;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Segoe UI',system-ui,sans-serif;
    color:var(--text);
    background:
      radial-gradient(130% 75% at 50% -12%, rgba(212,165,74,.11), transparent 60%),
      linear-gradient(180deg,var(--bg2),var(--bg));
    display:flex; flex-direction:column;
    padding:22px 24px 8px;
    -webkit-user-select:none; user-select:none;
    overflow:hidden;
  }

  /* ── update banner ── */
  .upd{
    display:none; align-items:center; gap:6px;
    margin-bottom:14px; padding:9px 12px;
    background:linear-gradient(180deg, rgba(212,165,74,.16), rgba(212,165,74,.09));
    border:1px solid rgba(212,165,74,.40); border-radius:8px;
    font-size:12px; color:var(--gold-h); cursor:pointer; transition:.15s;
  }
  .upd.show{display:flex;}
  .upd:hover{background:rgba(212,165,74,.22); border-color:var(--gold);}
  .upd b{font-weight:700; color:var(--gold-h);}
  .upd .arrow{margin-left:auto; font-size:13px; opacity:.85;}

  /* ── header ── */
  .hdr{display:flex; align-items:center; gap:12px;}
  .hdr img{width:38px; height:38px; border-radius:9px; box-shadow:0 2px 9px rgba(0,0,0,.55);}
  .hdr .t{flex:1; min-width:0;}
  .hdr .name{font-size:17px; font-weight:600; letter-spacing:.2px;}
  .hdr .name b{color:var(--gold);}
  .hdr .sub{font-size:11px; color:var(--muted2); margin-top:2px;}
  .rule{height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); margin:16px 0 18px;}

  /* ── fields ── */
  .f{margin-bottom:15px;}
  .f>label{
    display:block; font-size:10.5px; font-weight:600; letter-spacing:.6px;
    text-transform:uppercase; color:var(--muted); margin-bottom:7px;
  }
  .inp{
    width:100%; padding:9px 11px;
    background:var(--panel); border:1px solid var(--border); border-radius:8px;
    color:var(--text); font-size:13px; outline:none; transition:.15s;
  }
  .inp::placeholder{color:var(--muted2);}
  .inp:hover{border-color:var(--border-h);}
  .inp:focus{border-color:var(--gold); box-shadow:0 0 0 3px rgba(212,165,74,.13);}
  select.inp{appearance:none; cursor:pointer;
    background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);
    background-position:calc(100% - 16px) 16px,calc(100% - 11px) 16px;
    background-size:5px 5px,5px 5px; background-repeat:no-repeat;}
  .hint{font-size:10px; color:var(--muted2); margin-top:5px;}
  .hint b{color:var(--muted);}

  /* ── segmented (position) ── */
  .seg{display:flex; gap:6px;}
  .seg div{
    flex:1; text-align:center; padding:8px 0;
    background:var(--panel); border:1px solid var(--border); border-radius:8px;
    font-size:12px; color:var(--muted); cursor:pointer; transition:.15s;
  }
  .seg div:hover{border-color:var(--border-h); color:var(--text);}
  .seg div.on{
    border-color:var(--gold); color:var(--gold);
    background:rgba(212,165,74,.10);
    box-shadow:inset 0 0 0 1px rgba(212,165,74,.22);
  }

  /* ── sliders ── */
  .srow{display:flex; align-items:center; gap:12px;}
  .srow input[type=range]{flex:1; height:5px; cursor:pointer; accent-color:var(--gold);}
  .srow .val{font-size:12px; color:var(--text); min-width:42px; text-align:right; font-variant-numeric:tabular-nums;}

  /* ── launch ── */
  .err{color:#e0625b; font-size:11px; margin-bottom:8px; display:none;}
  .go{
    width:100%; padding:11px; margin-top:4px;
    background:linear-gradient(180deg,var(--gold-h),var(--gold-d));
    border:none; border-radius:9px;
    color:#1b1308; font-size:14px; font-weight:700; letter-spacing:2px;
    cursor:pointer; transition:.15s;
    box-shadow:0 4px 14px rgba(212,165,74,.24);
  }
  .go:hover{filter:brightness(1.06); box-shadow:0 6px 18px rgba(212,165,74,.32);}
  .go:active{transform:translateY(1px);}

  /* ── footer ── */
  .ftr{
    margin-top:14px;
    display:flex; justify-content:space-between; align-items:center;
    font-size:12px; color:var(--muted);
  }
  .ftr #verF{color:#a6a6b0; font-weight:500; font-variant-numeric:tabular-nums;}
  .ftr b{color:var(--gold); font-weight:600;}
</style>
</head>
<body>
  <div class="upd" id="upd" onclick="openUpd()">
    发现新版 <b id="updV"></b> · 点此下载 <span class="arrow">↗</span>
  </div>
  <div class="hdr">
    <img src="icon.ico" alt="">
    <div class="t">
      <div class="name"><b>AoE4</b> Overlay</div>
      <div class="sub">对局信息悬浮横幅</div>
    </div>
  </div>
  <div class="rule"></div>

  <div class="f">
    <label>玩家 ID</label>
    <input class="inp" type="text" id="pid" placeholder="粘贴 aoe4world / Steam 链接，或直接填 ID">
    <div class="hint">支持 <b>aoe4world ID</b> · <b>Steam ID(17位)</b> · 主页链接，自动识别</div>
  </div>

  <div class="f">
    <label>显示位置</label>
    <div class="seg">
      <div id="p-tl" onclick="pos('top-left')">左上</div>
      <div id="p-tc" class="on" onclick="pos('top-center')">居中</div>
      <div id="p-tr" onclick="pos('top-right')">右上</div>
    </div>
  </div>

  <div class="f">
    <label>不透明度</label>
    <div class="srow">
      <input type="range" id="opacity" min="40" max="100" value="60"
        oninput="document.getElementById('opV').textContent=this.value+'%'">
      <span class="val" id="opV">60%</span>
    </div>
  </div>

  <div class="f">
    <label>整体缩放</label>
    <div class="srow">
      <input type="range" id="zoom" min="50" max="150" step="5" value="75"
        oninput="document.getElementById('zmV').textContent=this.value+'%'">
      <span class="val" id="zmV">75%</span>
    </div>
  </div>

  <div class="f">
    <label>显示 / 隐藏 快捷键</label>
    <select class="inp" id="hk">
      <option value="">无</option>
      <option value="Alt+O">Alt+O</option>
      <option value="Ctrl+Shift+O">Ctrl+Shift+O</option>
      <option value="Ctrl+Shift+F12">Ctrl+Shift+F12</option>
      <option value="Ctrl+Alt+O">Ctrl+Alt+O</option>
      <option value="Ctrl+`">Ctrl+`</option>
    </select>
  </div>

  <div class="err" id="err">请输入有效的 Profile ID</div>
  <button class="go" onclick="go()">应 用</button>

  <div class="ftr">
    <span id="verF">v—</span>
    <span>by <b>Gold~</b></span>
  </div>

<script>
  const { invoke } = window.__TAURI__.core;
  const { listen } = window.__TAURI__.event;
  let _pos = 'top-center';
  let _updUrl = '';

  // 禁用 app 内的右键菜单（网页默认的刷新/检查等不该出现在桌面应用里）
  window.addEventListener('contextmenu', e => e.preventDefault());

  function pos(p){
    _pos = p;
    document.querySelectorAll('.seg div').forEach(d=>d.classList.remove('on'));
    const map={'top-left':'p-tl','top-center':'p-tc','top-right':'p-tr'};
    (document.getElementById(map[p])||document.getElementById('p-tc')).classList.add('on');
  }

  // 让窗口贴合内容：目标 CSS 宽=400(Electron 设计)，高=内容实际高度。
  // 注意：body 设了 height:100% 会被撑到视口高，所以不能用 scrollHeight；
  // 量页脚实际底边 + body 下内边距(8) 才是真正的内容高。
  function fitSelf(){
    const ftr = document.querySelector('.ftr');
    const h = Math.ceil(ftr.getBoundingClientRect().bottom + 8);
    invoke('fit_settings', { width: 400, height: h, vw: window.innerWidth, vh: window.innerHeight });
  }

  function showUpdate(v, url){
    _updUrl = url;
    document.getElementById('updV').textContent = 'v'+v;
    document.getElementById('upd').classList.add('show');
    requestAnimationFrame(fitSelf); // 更新条出现后高度变了，重新贴合
  }
  function openUpd(){ if(_updUrl) invoke('open_external', { url: _updUrl }); }

  function go(){
    let raw = document.getElementById('pid').value.trim();
    let m = raw.match(/(\d{3,})/);
    if(!m){ document.getElementById('err').style.display='block'; return; }
    document.getElementById('err').style.display='none';
    invoke('launch_overlay', { config: {
      profile_id: m[1],
      position: _pos,
      opacity: parseInt(document.getElementById('opacity').value),
      zoom: parseInt(document.getElementById('zoom').value),
      hotkey: document.getElementById('hk').value,
    }});
  }

  document.getElementById('pid').addEventListener('keydown', e=>{ if(e.key==='Enter') go(); });

  // 初始化：拉配置 + 版本 + 更新状态
  (async () => {
    try {
      const c = await invoke('get_config');
      if(c.profile_id) document.getElementById('pid').value = c.profile_id;
      pos(c.position || 'top-center');
      if(c.opacity){ document.getElementById('opacity').value=c.opacity; document.getElementById('opV').textContent=c.opacity+'%'; }
      if(c.zoom){ document.getElementById('zoom').value=c.zoom; document.getElementById('zmV').textContent=c.zoom+'%'; }
      if(c.hotkey) document.getElementById('hk').value=c.hotkey;
    } catch(e){}
    try {
      const info = await invoke('get_app_info');
      if(info.version) document.getElementById('verF').textContent = 'v'+info.version;
      if(info.update) showUpdate(info.update.version, info.update.url);
    } catch(e){}
    // 内容就绪后贴合窗口（多调一次兜底）
    requestAnimationFrame(fitSelf);
    setTimeout(fitSelf, 200);
  })();

  // 启动后才查到新版时，实时收到通知
  listen('update-available', (e) => { if(e.payload) showUpdate(e.payload.version, e.payload.url); });
</script>
</body>
</html>
